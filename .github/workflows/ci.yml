name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libeigen3-dev libopencv-dev libgtest-dev
      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
      - name: build
        run: cmake --build build -j 2
      - name: test
        run: ctest --test-dir build --output-on-failure
